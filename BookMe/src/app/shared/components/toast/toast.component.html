<div class="toast-container fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none" [@toastAnimation]="toastService.activeToasts().length">
  
  <div *ngFor="let toast of toastService.activeToasts(); trackBy: trackById"
       class="toast-card flex items-center gap-4 p-4 min-w-[320px] max-w-[450px] rounded-2xl shadow-2xl backdrop-blur-xl border pointer-events-auto cursor-pointer group"
       [ngClass]="{
         'bg-error/10 border-error/20 text-error': toast.type === 'error',
         'bg-success/10 border-success/20 text-success': toast.type === 'success',
         'bg-blue-500/10 border-blue-500/20 text-blue-600': toast.type === 'info',
         'bg-amber-500/10 border-amber-500/20 text-amber-600': toast.type === 'warning'
       }"
       (click)="remove(toast.id)">
    
    <!-- Icon -->
    <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0"
         [ngClass]="{
           'bg-error/20': toast.type === 'error',
           'bg-success/20': toast.type === 'success',
           'bg-blue-500/20': toast.type === 'info',
           'bg-amber-500/20': toast.type === 'warning'
         }">
      <span class="material-symbols-outlined text-[24px]">{{getIcon(toast.type)}}</span>
    </div>

    <!-- Message -->
    <div class="flex-1 pr-2">
      <p class="font-body font-bold text-sm leading-tight">{{toast.message}}</p>
    </div>

    <!-- Close Button -->
    <button class="w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black/5">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>

    <!-- Progress Timer (Visual only for premium feel) -->
    <div class="absolute bottom-0 left-4 right-4 h-0.5 bg-current opacity-20 overflow-hidden rounded-full">
        <div class="h-full bg-current toast-progress"></div>
    </div>
  </div>

</div>
