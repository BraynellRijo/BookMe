<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BookMe — Find Your Perfect Stay</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="BookMe is a modern rental platform to discover, book, and host unique places around the world." />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@400,0,0,24&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
      html {
        scroll-snap-type: y proximity;
        scroll-behavior: smooth;
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        overflow-x: hidden;
      }
      .snap-section {
        scroll-snap-align: start;
        scroll-snap-stop: always;
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center; /* Explicit centering */
        position: relative;
        z-index: 1;
      }
      /* Fallback for visibility */
      [data-aos] {
        opacity: 1;
        pointer-events: auto !important;
      }
      /* AOS will override this once it initializes */
    </style>
  </head>
  <body>
    <app-root></app-root>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script>
      // Force AOS init on load
      function initAOS() {
        if (typeof AOS !== 'undefined') {
          AOS.init({
            duration: 1000,
            once: false,
            mirror: true
          });
        }
      }
      window.addEventListener('load', initAOS);
    </script>
  </body>
</html>
